<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akash Kumar Mishra | AI Chatbot Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"><style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:100%;
max-width:900px;
height:85vh;
background:rgba(11,17,32,.95);
backdrop-filter:blur(10px);
border-radius:22px;
box-shadow:0 25px 70px rgba(0,0,0,.8);
display:flex;
flex-direction:column;
overflow:hidden;
animation:fadeIn 1s ease
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.header{
padding:18px 20px;
border-bottom:1px solid rgba(255,255,255,0.08)
}

.header h1{font-size:18px}
.header p{font-size:12px;opacity:.7;margin-top:4px}

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:12px 15px;
border-bottom:1px solid rgba(255,255,255,0.05)
}

.quick button{
background:#1e293b;
border:none;
color:white;
padding:7px 12px;
font-size:12px;
border-radius:10px;
cursor:pointer;
transition:.25s
}

.quick button:hover{
background:#2563eb;
transform:translateY(-2px) scale(1.05)
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:14px
}

.message{
padding:12px 16px;
border-radius:14px;
max-width:75%;
font-size:14px;
line-height:1.5;
animation:msgFade .3s ease
}

@keyframes msgFade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

.bot{
background:#1e293b;
align-self:flex-start
}

.user{
background:#2563eb;
align-self:flex-end
}

.input-area{
padding:14px;
display:flex;
gap:8px;
border-top:1px solid rgba(255,255,255,0.08)
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#020617;
color:white
}

button.send{
padding:12px 16px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
transition:.25s
}

button.send:hover{
background:#1d4ed8;
transform:scale(1.05)
}

.voice{
background:#16a34a;
border:none;
padding:12px 14px;
border-radius:12px;
color:white;
cursor:pointer;
transition:.25s
}

.voice:hover{
background:#15803d;
transform:scale(1.05)
}

.typing{
font-size:12px;
opacity:.7
}

/* Mobile */
@media (max-width:600px){
.header h1{font-size:16px}

.quick button{
font-size:11px
}

.message{font-size:13px}
}

</style></head><body><div class="container"><div class="header">
<h1>🤖 Akash Kumar Mishra — AI Portfolio Assistant</h1>
<p>Generative AI • Chatbot Developer • Conversational AI</p>
</div><div class="quick">
<button onclick="ask('experience')">💼 Experience</button>
<button onclick="ask('skills')">🧠 Skills</button>
<button onclick="ask('projects')">🚀 Projects</button>
<button onclick="ask('achievements')">🏆 Achievements</button>
<button onclick="ask('certifications')">📜 Certifications</button>
<button onclick="ask('contact')">📞 Contact</button>
</div><div class="chat" id="chat">
<div class="message bot">👋 Hi! I'm Akash's AI assistant. Ask me about his <b>GenAI experience</b>, chatbot projects, skills or achievements.</div>
</div><div class="input-area">
<input id="input" placeholder="Ask something about Akash... 💬" />
<button class="voice" onclick="startVoice()">🎤</button>
<button class="send" onclick="sendMessage()">Send 🚀</button>
</div></div><script>

const chat=document.getElementById('chat')

function addMessage(text,type){

const msg=document.createElement('div')
msg.classList.add('message',type)
msg.innerHTML=text
chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight

}

function typing(){

const t=document.createElement('div')
t.classList.add('typing')
t.id='typing'
t.innerText='🤖 AI is typing...'

chat.appendChild(t)
chat.scrollTop=chat.scrollHeight

}

function removeTyping(){
const t=document.getElementById('typing')
if(t)t.remove()
}

function botReply(q){

q=q.toLowerCase()

if(q.includes('experience')){
return "💼 Akash has <b>3+ years of experience</b> building conversational AI systems. He worked at <b>Tata Consultancy Services</b> and <b>Genpact</b> developing enterprise chatbots using Microsoft Copilot Studio, GPT models and automation workflows." 
}

if(q.includes('skills')){
return "🧠 Akash's core skills include: <br><br>• Microsoft Copilot Studio <br>• Generative AI <br>• Retrieval Augmented Generation (RAG) <br>• Python <br>• Power Automate <br>• Bot Framework Composer <br>• Git & Postman"
}

if(q.includes('project')){
return "🚀 Key AI Projects built by Akash: <br><br>1️⃣ Enterprise RAG chatbot retrieving answers from company documents. <br><br>2️⃣ SQL AI Agent converting database output into natural language responses. <br><br>3️⃣ Enterprise assistants for Finance, IT and Sourcing teams."
}

if(q.includes('achievement')){
return "🏆 Akash received the <b>On-The-Spot Team Award</b> at TCS for integrating Copilot Studio with Node.js using Direct Line API and delivering the solution within tight timelines."
}

if(q.includes('certification')){
return "📜 Akash holds the <b>Databricks Accredited Generative AI Fundamentals</b> certification validating his knowledge in modern GenAI systems."
}

if(q.includes('contact')){
return "📞 Contact Akash here:<br><br>📧 Email: akashmishra2797@gmail.com <br>📱 Phone: +91-9993379161 <br>📍 Location: Indore, India"
}

return "✨ You can ask about <b>experience</b>, <b>skills</b>, <b>projects</b>, <b>achievements</b>, <b>certifications</b>, or <b>contact</b>."

}

function ask(q){
addMessage(q,'user')
reply(q)
}

function reply(text){

typing()

setTimeout(()=>{
removeTyping()
addMessage(botReply(text),'bot')
},900)

}

function sendMessage(){

const input=document.getElementById('input')
const text=input.value.trim()

if(!text)return

addMessage(text,'user')
input.value=''
reply(text)

}

function startVoice(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.lang='en-US'
recognition.start()

recognition.onresult=function(e){
const text=e.results[0][0].transcript
addMessage(text,'user')
reply(text)
}

}

</script></body>
</html>
