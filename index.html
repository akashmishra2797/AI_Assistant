<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akash Mishra | AI Portfolio</title>

<style>

:root{
--accent:#38bdf8;
--bg1:#020617;
--bg2:#0f172a;
--bot:#334155;
--user:#38bdf8;
--text:#f8fafc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{

background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow-x:hidden;

}

/* floating emoji */

.emoji{
position:absolute;
font-size:40px;
opacity:.2;
animation:float 8s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* container */

#app{

width:95%;
max-width:950px;
height:90vh;

background:rgba(30,41,59,.7);

border-radius:20px;

backdrop-filter:blur(14px);

border:1px solid rgba(56,189,248,.3);

display:flex;
flex-direction:column;

box-shadow:0 30px 70px rgba(0,0,0,.6);

}

/* header */

header{

padding:20px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.1);

}

header h1{

color:var(--accent);
font-size:18px;
letter-spacing:1px;

}

/* chat */

#chat{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;

flex-direction:column;

gap:14px;

}

/* message */

.msg{

max-width:80%;

padding:14px 18px;

border-radius:16px;

font-size:14px;

line-height:1.6;

animation:fade .3s;

}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.bot{

background:var(--bot);

align-self:flex-start;

border-bottom-left-radius:4px;

}

.user{

background:var(--user);

color:#001018;

font-weight:600;

align-self:flex-end;

border-bottom-right-radius:4px;

}

.time{

font-size:10px;

opacity:.6;

margin-top:4px;

}

/* skill grid */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(110px,1fr));

gap:10px;

margin-top:10px;

}

.card{

padding:10px;

border:1px solid var(--accent);

border-radius:10px;

font-size:12px;

text-align:center;

background:rgba(15,23,42,.5);

transition:.3s;

}

.card:hover{

transform:translateY(-3px);

background:rgba(56,189,248,.2);

}

/* controls */

.controls{

padding:15px;

border-top:1px solid rgba(255,255,255,.1);

display:flex;

flex-direction:column;

gap:10px;

}

/* chips */

.chips{

display:flex;

flex-wrap:wrap;

gap:8px;

justify-content:center;

}

.chip{

border:1px solid var(--accent);

padding:8px 16px;

border-radius:20px;

cursor:pointer;

font-size:13px;

color:var(--accent);

background:transparent;

transition:.2s;

}

.chip:hover{

background:var(--accent);

color:#000;

transform:translateY(-2px);

}

/* input */

.inputBox{

display:flex;

gap:8px;

}

input{

flex:1;

padding:10px;

border:none;

border-radius:12px;

background:#020617;

color:white;

}

button{

border:none;

padding:10px 14px;

border-radius:12px;

cursor:pointer;

background:var(--accent);

color:#000;

font-weight:600;

}

button:hover{

transform:scale(1.05);

}

/* mobile */

@media(max-width:600px){

#app{height:95vh}

.msg{font-size:13px}

}

</style>
</head>

<body>

<div class="emoji" style="top:10%;left:5%">🤖</div>
<div class="emoji" style="bottom:10%;right:10%;animation-delay:3s">🚀</div>
<div class="emoji" style="top:50%;left:80%;animation-delay:5s">✨</div>

<div id="app">

<header>
<h1>AKASH_AI_PORTFOLIO.exe</h1>
</header>

<div id="chat">

<div class="msg bot">
👋 Hello! I'm <b>Akash Mishra's AI assistant</b>.<br><br>
Ask me about:
<br>💼 Experience
<br>🧠 Skills
<br>🏆 Achievements
<br>📞 Contact
</div>

</div>

<div class="controls">

<div class="chips">

<div class="chip" onclick="ask('experience')">💼 Experience</div>
<div class="chip" onclick="ask('skills')">🧠 Skills</div>
<div class="chip" onclick="ask('achievements')">🏆 Awards</div>
<div class="chip" onclick="ask('contact')">📞 Contact</div>

</div>

<div class="inputBox">

<input id="input" placeholder="Ask something about Akash...">

<button onclick="send()">Send</button>

<button onclick="voice()">🎤</button>

</div>

</div>

</div>

<script>

const chat=document.getElementById("chat")

function message(text,type){

const div=document.createElement("div")

div.className=`msg ${type}`

const time=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

div.innerHTML=text+`<div class="time">${time}</div>`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function typing(){

const t=document.createElement("div")

t.className="msg bot"

t.id="typing"

t.innerHTML="🤖 AI is typing..."

chat.appendChild(t)

chat.scrollTop=chat.scrollHeight

}

function stopTyping(){

const t=document.getElementById("typing")

if(t) t.remove()

}

function ask(topic){

message(topic,"user")

reply(topic)

}

function send(){

const input=document.getElementById("input")

if(!input.value) return

message(input.value,"user")

reply(input.value)

input.value=""

}

function reply(q){

typing()

setTimeout(()=>{

stopTyping()

q=q.toLowerCase()

let res=""

if(q.includes("experience")){

res=`💼 <b>Experience</b>

<br><br>

<b>Genpact</b> – Consultant building enterprise GenAI copilots using GPT APIs and RAG pipelines.

<br><br>

<b>SkillRecruit</b> – Developed SQL AI agents and GPT integrations.

<br><br>

<b>TCS</b> – Built enterprise chatbots with Copilot Studio and Power Automate.`

}

else if(q.includes("skill")){

res=`🧠 <b>Tech Stack</b>

<div class="grid">

<div class="card">GPT / LLM</div>
<div class="card">RAG Pipelines</div>
<div class="card">Copilot Studio</div>
<div class="card">Python</div>
<div class="card">Power Automate</div>
<div class="card">Kore.ai</div>

</div>`

}

else if(q.includes("achievement")){

res=`🏆 On-The-Spot Team Award at TCS for Direct Line API integration.

<br><br>

📜 Databricks Accredited Generative AI Fundamentals`

}

else if(q.includes("contact")){

res=`📞 Let's connect

<br><br>

📧 akashmishra2797@gmail.com
<br>
📞 +91-9993379161
<br>
📍 Indore / Gurugram`

}

else{

res="You can ask about experience, skills, achievements or contact."

}

message(res,"bot")

},900)

}

function voice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="en-US"

rec.start()

rec.onresult=e=>{

const text=e.results[0][0].transcript

message(text,"user")

reply(text)

}

}

</script>

</body>
</html>
