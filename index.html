<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akash Mishra | AI Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#chat-container{
width:95%;
max-width:900px;
height:90vh;
background:rgba(30,41,59,.8);
border-radius:20px;
display:flex;
flex-direction:column;
}

header{
padding:20px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
color:#38bdf8;
}

#chat-window{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:80%;
padding:12px 16px;
border-radius:14px;
font-size:14px;
line-height:1.5;
}

.bot{
background:#334155;
align-self:flex-start;
}

.user{
background:#38bdf8;
color:black;
align-self:flex-end;
}

.controls{
padding:15px;
border-top:1px solid rgba(255,255,255,.1);
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

button{
border:1px solid #38bdf8;
background:transparent;
color:#38bdf8;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#38bdf8;
color:black;
}

</style>
</head>

<body>

<div id="chat-container">

<header>
<h2>AKASH_AI_DEVELOPER.exe</h2>
</header>

<div id="chat-window">

<div class="msg bot">
Hello! 👋 I am <b>Akash Kumar Mishra</b>, a Consultant at Genpact.

<br><br>

I specialize in **Generative AI, RAG pipelines, and enterprise chatbots**.

<br><br>

Ask me about my experience, skills, or projects.
</div>

</div>

<div class="controls">

<button onclick="ask('experience')">💼 Experience</button>
<button onclick="ask('skills')">🧠 Tech Stack</button>
<button onclick="ask('awards')">🏆 Awards</button>
<button onclick="ask('contact')">📞 Contact</button>

</div>

</div>

<script>

const chat=document.getElementById("chat-window")

function addMessage(text,type){

const div=document.createElement("div")
div.className="msg "+type
div.innerHTML=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function ask(topic){

addMessage("Tell me about your "+topic,"user")

setTimeout(()=>{

let response=""

if(topic==="experience"){

response=`💼 <b>Experience</b>

<br><br>

<b>Genpact</b> – Building GenAI copilots using GPT APIs and RAG pipelines.

<br><br>

<b>SkillRecruit</b> – Built SQL AI agents and GPT integrations.

<br><br>

<b>TCS</b> – Automated workflows using Copilot Studio and Power Automate.`

}

else if(topic==="skills"){

response=`🧠 <b>Tech Stack</b>

<br><br>

• GPT / LLMs  
• RAG Pipelines  
• Microsoft Copilot Studio  
• Python  
• Power Automate  
• Kore.ai`

}

else if(topic==="awards"){

response=`🏆 <b>On the Spot Team Award</b> at TCS.

<br><br>

📜 Databricks Accredited Generative AI Fundamentals`

}

else{

response=`📞 Let's connect!

<br><br>

📧 akashmishra2797@gmail.com

<br>

📞 +91-9993379161

<br>

📍 Indore / Gurugram`

}

addMessage(response,"bot")

},700)

}

</script>

</body>
</html>
